services:
  seedrelay:
    image: ghcr.io/27aaron/seedrelay:latest
    build: .
    container_name: seedrelay
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8000}
      - MODEL=${MODEL:-seed-asr}
      - API_KEY=${API_KEY:-}
      - DEBUG=${DEBUG:-false}
      - WEB=${WEB:-false}
    restart: unless-stopped
