<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SeedRelay</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #10120f;
        --panel: #171a16;
        --panel-2: #20241d;
        --ink: #eef2df;
        --muted: #a9b29a;
        --line: #343b2e;
        --accent: #d7ff5f;
        --accent-2: #7bdff2;
        --danger: #ff7a7a;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
        --final-panel-block: calc((100vh - 64px) / 6);
        --transcript-body-size: clamp(18px, 1.45vw, 24px);
        --final-body-size: clamp(16px, 1.2vw, 20px);
        --final-body-color: color-mix(in srgb, var(--ink) 94%, transparent);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(215, 255, 95, 0.09), transparent 34%),
          radial-gradient(circle at 80% 16%, rgba(123, 223, 242, 0.14), transparent 28%),
          var(--bg);
        color: var(--ink);
        font-family:
          ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas,
          monospace;
      }

      main {
        width: min(1440px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      .shell {
        display: grid;
        grid-template-columns: minmax(320px, 0.78fr) minmax(560px, 1.22fr);
        gap: 16px;
        block-size: calc(100vh - 64px);
        max-block-size: calc(100vh - 64px);
        min-height: 0;
      }

      .side {
        min-width: 0;
        display: grid;
        grid-template-rows: minmax(0, 1fr);
        min-height: 0;
      }

      .panel {
        min-width: 0;
        border: 1px solid var(--line);
        background: color-mix(in srgb, var(--panel) 92%, transparent);
        box-shadow: var(--shadow);
      }

      .control {
        display: flex;
        flex-direction: column;
        min-height: 0;
        padding: 22px;
      }

      .brand {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
        flex-wrap: wrap;
        padding-bottom: 22px;
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0;
        font-size: clamp(26px, 4.6vw, 58px);
        line-height: 0.94;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .wordmark {
        white-space: nowrap;
      }

      .tag {
        border: 1px solid var(--line);
        color: var(--accent);
        padding: 8px 10px;
        white-space: nowrap;
        font-size: 12px;
        background: #10140e;
      }

      .status-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 10px;
        margin: 20px 0;
      }

      .metric {
        min-height: 82px;
        padding: 13px;
        background: var(--panel-2);
        border: 1px solid var(--line);
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        margin-bottom: 12px;
      }

      .metric strong {
        display: block;
        font-size: 18px;
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      .buttons {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 44px;
        gap: 10px;
        margin-top: auto;
      }

      button {
        height: 44px;
        border: 1px solid var(--line);
        background: #eef2df;
        color: #11140f;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button.secondary {
        background: transparent;
        color: var(--ink);
      }

      button.icon {
        background: var(--panel-2);
        color: var(--muted);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.42;
      }

      .meter {
        height: 26px;
        margin: 0;
        border: 1px solid var(--line);
        background:
          repeating-linear-gradient(
            90deg,
            transparent 0,
            transparent 23px,
            rgba(169, 178, 154, 0.1) 24px
          ),
          #0b0d0a;
        overflow: hidden;
      }

      .meter div {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        transition: width 90ms linear;
      }

      .signal-panel {
        --signal-level: 0%;
        flex: 1 1 auto;
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        gap: 14px;
        min-height: 0;
        margin: 6px 0 16px;
        padding: 14px;
        border: 1px solid var(--line);
        background: color-mix(in srgb, var(--panel-2) 70%, transparent);
        overflow: hidden;
      }

      .signal-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 0;
      }

      .signal-heading span:last-child {
        color: var(--accent);
      }

      .signal-meter-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 54px;
        gap: 12px;
        align-items: center;
      }

      #signalValue {
        color: var(--ink);
        font-size: 18px;
        text-align: right;
      }

      .signal-scope {
        isolation: isolate;
        position: relative;
        min-height: 0;
        overflow: hidden;
        border: 1px solid var(--line);
        background:
          linear-gradient(
            180deg,
            rgba(238, 242, 223, 0.02),
            rgba(11, 13, 10, 0.28)
          ),
          repeating-linear-gradient(
            90deg,
            transparent 0,
            transparent 23px,
            rgba(169, 178, 154, 0.08) 24px
          ),
          repeating-linear-gradient(
            0deg,
            transparent 0,
            transparent 23px,
            rgba(169, 178, 154, 0.08) 24px
          ),
          #0b0d0a;
      }

      .signal-scope::before {
        content: "";
        position: absolute;
        right: 12px;
        left: 12px;
        top: 50%;
        height: 1px;
        background: color-mix(in srgb, var(--muted) 34%, transparent);
        box-shadow: 0 0 12px rgba(215, 255, 95, 0.18);
        z-index: 1;
      }

      .signal-scope::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(
            90deg,
            rgba(215, 255, 95, 0.08),
            transparent 18%,
            transparent 82%,
            rgba(123, 223, 242, 0.07)
          ),
          radial-gradient(
            circle at 50% 50%,
            transparent 45%,
            rgba(0, 0, 0, 0.28)
          );
        pointer-events: none;
        z-index: 3;
      }

      .scope-wave {
        position: absolute;
        inset: 12px 12px 10px;
        width: calc(100% - 24px);
        height: calc(100% - 22px);
        overflow: visible;
        z-index: 2;
      }

      .signal-wave {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        vector-effect: non-scaling-stroke;
      }

      .signal-wave-glow {
        stroke: rgba(215, 255, 95, 0.16);
        stroke-width: 3.5;
        opacity: 0.24;
        filter: url(#scopeGlow);
      }

      .signal-wave-trail {
        stroke: rgba(123, 223, 242, 0.2);
        stroke-width: 0.95;
        opacity: 0.32;
      }

      .signal-wave-primary {
        stroke: url(#scopeWaveGradient);
        stroke-width: 1.35;
        filter: url(#scopeGlow);
      }

      .readout {
        padding: 22px;
        overflow: hidden;
      }

      .readout {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) var(--final-panel-block);
        block-size: calc(100vh - 64px);
        max-block-size: calc(100vh - 64px);
        min-height: 0;
      }

      .events {
        flex: 0 0 var(--final-panel-block);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        block-size: var(--final-panel-block);
        margin: 0 0 16px;
        padding: 14px;
        border: 1px solid var(--line);
        background: color-mix(in srgb, var(--panel-2) 72%, transparent);
        min-height: 0;
        overflow: hidden;
      }

      .label {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      .label-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--line);
      }

      .live-dot {
        width: 8px;
        height: 8px;
        background: var(--accent);
        box-shadow: 0 0 18px rgba(215, 255, 95, 0.56);
      }

      #partial,
      #final {
        font-family:
          "Iowan Old Style", "Songti SC", "Noto Serif CJK SC", Georgia, serif;
        letter-spacing: 0;
      }

      #partial {
        block-size: 100%;
        max-block-size: none;
        min-height: 0;
        padding: 4px 0 8px;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
        overscroll-behavior: contain;
      }

      #partial.empty::before,
      #final.empty::before {
        content: attr(data-placeholder);
        display: block;
        color: color-mix(in srgb, var(--muted) 58%, transparent);
        font-family:
          ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas,
          monospace;
        font-size: 14px;
        line-height: 1.6;
      }

      .transcript-line {
        display: grid;
        grid-template-columns: 38px minmax(0, 1fr);
        gap: 12px;
        align-items: baseline;
        min-height: 40px;
        padding: 7px 0;
        border-bottom: 1px solid color-mix(in srgb, var(--line) 72%, transparent);
      }

      .line-index {
        color: color-mix(in srgb, var(--muted) 70%, transparent);
        font-size: 11px;
        font-family:
          ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas,
          monospace;
        text-transform: uppercase;
      }

      .line-text {
        color: color-mix(in srgb, var(--ink) 94%, transparent);
        font-family:
          "Iowan Old Style", "Songti SC", "Noto Serif CJK SC", Georgia, serif;
        font-size: var(--transcript-body-size);
        line-height: 1.3;
        overflow-wrap: anywhere;
      }

      .transcript-line.active .line-index {
        color: var(--accent);
      }

      .transcript-line.active .line-text {
        color: var(--ink);
      }

      .final-wrap {
        min-height: 0;
        margin-top: 0;
        padding-top: 16px;
        border-top: 1px solid var(--line);
        overflow: hidden;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .final-label {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      #final {
        color: var(--final-body-color);
        font-size: var(--final-body-size);
        line-height: 1.45;
        max-height: none;
        min-height: 0;
        overflow: auto;
        overflow-wrap: anywhere;
        overscroll-behavior: contain;
      }

      #events {
        min-height: 0;
        overflow: auto;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.65;
        white-space: pre-wrap;
        overscroll-behavior: contain;
      }

      .ok {
        color: var(--accent);
      }

      .bad {
        color: var(--danger);
      }

      @media (max-width: 860px) {
        .shell {
          grid-template-columns: 1fr;
          block-size: auto;
          max-block-size: none;
          min-height: calc(100vh - 64px);
        }

        .side {
          grid-template-rows: auto;
          min-height: auto;
        }

        .control {
          min-height: 430px;
        }

        .events {
          block-size: auto;
          flex-basis: auto;
          min-height: 120px;
        }

        .readout {
          grid-template-rows: auto minmax(260px, 1fr) minmax(180px, auto);
          block-size: auto;
          max-block-size: none;
          min-height: 560px;
        }
      }

      @media (max-width: 520px) {
        main {
          width: min(100vw - 24px, 1180px);
          padding: 24px 0;
        }

        .shell {
          block-size: auto;
          max-block-size: none;
          min-height: calc(100vh - 48px);
        }

        .side {
          grid-template-rows: auto;
          min-height: auto;
        }

        .control,
        .readout {
          padding: 22px;
        }

        .brand {
          flex-direction: column;
          align-items: flex-start;
        }

        .wordmark {
          font-size: clamp(24px, 7vw, 34px);
        }

        .line-text {
          font-size: clamp(18px, 5vw, 22px);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="shell">
        <aside class="side">
          <section class="panel control">
            <div class="brand">
              <h1 class="wordmark">Seed Relay</h1>
              <div class="tag">seed-asr-2.0</div>
            </div>

            <div class="status-grid">
              <div class="metric">
                <span>Socket</span>
                <strong id="socketState">idle</strong>
              </div>
              <div class="metric">
                <span>Audio</span>
                <strong id="audioState">idle</strong>
              </div>
              <div class="metric">
                <span>Rate</span>
                <strong id="rate">--</strong>
              </div>
              <div class="metric">
                <span>Frames</span>
                <strong id="frames">0</strong>
              </div>
            </div>

            <section class="signal-panel">
              <div class="label signal-heading">
                <span>Signal</span>
                <span id="signalState">quiet</span>
              </div>
              <div class="signal-meter-row">
                <div class="meter"><div id="level"></div></div>
                <strong id="signalValue">0%</strong>
              </div>
              <div class="signal-scope" aria-hidden="true">
                <svg class="scope-wave" viewBox="0 0 240 96" preserveAspectRatio="none">
                  <defs>
                    <linearGradient id="scopeWaveGradient" x1="0" x2="1" y1="0" y2="0">
                      <stop offset="0%" stop-color="#d7ff5f" />
                      <stop offset="55%" stop-color="#a7f6b2" />
                      <stop offset="100%" stop-color="#7bdff2" />
                    </linearGradient>
                    <filter id="scopeGlow" x="-20%" y="-80%" width="140%" height="260%">
                      <feGaussianBlur stdDeviation="1.0" result="blur" />
                      <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                      </feMerge>
                    </filter>
                  </defs>
                  <polyline id="signalWaveGlow" class="signal-wave signal-wave-glow"></polyline>
                  <polyline id="signalWaveTrail" class="signal-wave signal-wave-trail"></polyline>
                  <polyline id="signalWavePrimary" class="signal-wave signal-wave-primary"></polyline>
                </svg>
              </div>
            </section>

            <section class="events">
              <div class="label">Events</div>
              <div id="events"></div>
            </section>

            <div class="buttons">
              <button id="start">Start</button>
              <button id="stop" class="secondary" disabled>Stop</button>
              <button id="clear" class="icon" title="Clear">×</button>
            </div>
          </section>
        </aside>

        <section class="panel readout">
          <div class="label label-row">
            <span>Transcript</span>
            <span class="live-dot" aria-hidden="true"></span>
          </div>
          <div
            id="partial"
            class="empty"
            data-placeholder="Listening transcript appears here"
          ></div>
          <div class="final-wrap">
            <div class="final-label">Final</div>
            <div
              id="final"
              class="empty"
              data-placeholder="Completed transcript appears here"
            ></div>
          </div>
        </section>
      </div>
    </main>

    <script>
      const els = {
        start: document.querySelector("#start"),
        stop: document.querySelector("#stop"),
        clear: document.querySelector("#clear"),
        socketState: document.querySelector("#socketState"),
        audioState: document.querySelector("#audioState"),
        rate: document.querySelector("#rate"),
        frames: document.querySelector("#frames"),
        signalPanel: document.querySelector(".signal-panel"),
        signalState: document.querySelector("#signalState"),
        signalValue: document.querySelector("#signalValue"),
        signalWaveGlow: document.querySelector("#signalWaveGlow"),
        signalWaveTrail: document.querySelector("#signalWaveTrail"),
        signalWavePrimary: document.querySelector("#signalWavePrimary"),
        level: document.querySelector("#level"),
        partial: document.querySelector("#partial"),
        final: document.querySelector("#final"),
        events: document.querySelector("#events"),
      };

      let ws = null;
      let mediaStream = null;
      let audioContext = null;
      let source = null;
      let worklet = null;
      let mutedOutput = null;
      let frameCount = 0;
      let isRecording = false;
      let transcriptText = "";
      let signalPeak = 0;
      let signalPhase = 0;
      let lastSignalWaveAt = 0;
      let lastSignalWaveLevel = 0;
      const MAX_TRANSCRIPT_LINE = 12;
      const MAX_EVENT_LINES = 5;
      const SIGNAL_WAVE_INTERVAL_MS = 140;

      const workletSource = `
        class CaptureProcessor extends AudioWorkletProcessor {
          process(inputs) {
            const channel = inputs[0] && inputs[0][0];
            if (channel && channel.length) {
              this.port.postMessage(channel.slice(0));
            }
            return true;
          }
        }
        registerProcessor("capture-processor", CaptureProcessor);
      `;

      function realtimeUrl() {
        const url = new URL("/v1/realtime?model=seed-asr-2.0", window.location.href);
        url.protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        return url.toString();
      }

      function log(line, kind = "") {
        const time = new Date().toLocaleTimeString();
        const prefix = kind ? `[${kind}]` : "";
        const nextLine = `${time} ${prefix} ${line}`;
        const lines = els.events.textContent.split("\n").filter(Boolean);
        els.events.textContent = [nextLine, ...lines].slice(0, MAX_EVENT_LINES).join("\n");
      }

      function setSocket(state, ok = false) {
        els.socketState.textContent = state;
        els.socketState.className = ok ? "ok" : "";
      }

      function setAudio(state, bad = false) {
        els.audioState.textContent = state;
        els.audioState.className = bad ? "bad" : "";
      }

      function signalStateForPeak(peak) {
        if (peak >= 0.7) return "clipping";
        if (peak >= 0.01) return "voice";
        return "quiet";
      }

      function signalLevelFromPeak(peak) {
        return Math.min(100, Math.sqrt(Math.min(1, Math.max(0, peak))) * 125);
      }

      function buildWavePoints(level, phase, offset = 0) {
        const width = 240;
        const center = 48;
        const amplitude = level === 0 ? 0 : 0.8 + level * 0.1;
        const points = [];
        for (let i = 0; i <= 72; i += 1) {
          const t = i / 72;
          const x = t * width;
          const carrier = Math.sin(t * Math.PI * 6 + phase + offset);
          const detail = Math.sin(t * Math.PI * 17 + phase * 0.74 + offset) * 0.24;
          const shimmer = Math.sin(t * Math.PI * 31 - phase * 0.36) * 0.08;
          const y = Math.max(4, Math.min(92, center + (carrier + detail + shimmer) * amplitude));
          points.push(`${x.toFixed(1)},${y.toFixed(1)}`);
        }
        return points.join(" ");
      }

      function updateSignalWave(level, force = false) {
        const now = performance.now();
        const becameActive = lastSignalWaveLevel === 0 && level > 0;
        if (!force && !becameActive && now - lastSignalWaveAt < SIGNAL_WAVE_INTERVAL_MS) return;
        lastSignalWaveAt = now;
        lastSignalWaveLevel = level;
        signalPhase = (signalPhase + 0.018 + level / 900) % (Math.PI * 2);
        const primary = buildWavePoints(level, signalPhase);
        const trail = buildWavePoints(level * 0.58, signalPhase - 0.9, 0.7);
        els.signalWaveGlow.setAttribute("points", primary);
        els.signalWavePrimary.setAttribute("points", primary);
        els.signalWaveTrail.setAttribute("points", trail);
      }

      function setSignal(peak) {
        const level = signalLevelFromPeak(peak);
        signalPeak = peak === 0 ? 0 : Math.max(signalPeak * 0.86, level);
        els.level.style.width = `${level}%`;
        els.signalPanel.style.setProperty("--signal-level", `${signalPeak}%`);
        els.signalValue.textContent = `${Math.round(signalPeak)}%`;
        els.signalState.textContent = signalStateForPeak(peak);
        updateSignalWave(signalPeak, peak === 0);
      }

      function pcm16Base64(samples) {
        const bytes = new Uint8Array(samples.length * 2);
        const view = new DataView(bytes.buffer);
        let peak = 0;
        for (let i = 0; i < samples.length; i += 1) {
          const sample = Math.max(-1, Math.min(1, samples[i]));
          peak = Math.max(peak, Math.abs(sample));
          const int16 = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
          view.setInt16(i * 2, int16, true);
        }
        setSignal(peak);

        let binary = "";
        const chunk = 0x8000;
        for (let i = 0; i < bytes.length; i += chunk) {
          binary += String.fromCharCode(...bytes.subarray(i, i + chunk));
        }
        return btoa(binary);
      }

      function sendJson(payload) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify(payload));
      }

      function setText(el, text) {
        el.textContent = text;
        el.classList.toggle("empty", !text);
      }

      function createTranscriptLine(text, index, active) {
        const row = document.createElement("div");
        row.className = `transcript-line${active ? " active" : ""}`;

        const number = document.createElement("span");
        number.className = "line-index";
        number.textContent = String(index + 1).padStart(2, "0");

        const content = document.createElement("span");
        content.className = "line-text";
        content.textContent = text;

        row.append(number, content);
        return row;
      }

      function splitTranscript(text) {
        const normalized = text.replace(/\s+/g, " ").trim();
        if (!normalized) return [];

        const phrases = normalized.match(/[^。！？!?；;\n]+[。！？!?；;]?/g) || [normalized];
        const lines = [];
        for (const phrase of phrases) {
          let rest = phrase.trim();
          while (rest.length > MAX_TRANSCRIPT_LINE) {
            const slice = rest.slice(0, MAX_TRANSCRIPT_LINE + 1);
            const spaceBreak = slice.lastIndexOf(" ");
            const cut = spaceBreak > 6 ? spaceBreak : MAX_TRANSCRIPT_LINE;
            lines.push(rest.slice(0, cut).trim());
            rest = rest.slice(cut).trim();
          }
          if (rest) lines.push(rest);
        }
        return lines;
      }

      function renderTranscript(text) {
        transcriptText = text;
        const lines = splitTranscript(text);
        els.partial.replaceChildren();
        els.partial.classList.toggle("empty", lines.length === 0);
        for (const [index, line] of lines.entries()) {
          els.partial.append(createTranscriptLine(line, index, index === lines.length - 1));
        }
        els.partial.scrollTop = els.partial.scrollHeight;
      }

      function appendTranscriptDelta(delta) {
        renderTranscript(transcriptText + delta);
      }

      function resetTranscript() {
        renderTranscript("");
        setText(els.final, "");
      }

      async function start() {
        els.start.disabled = true;
        els.stop.disabled = false;
        frameCount = 0;
        els.frames.textContent = "0";
        resetTranscript();
        setAudio("requesting");

        try {
          mediaStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true,
            },
          });
          audioContext = new AudioContext();
          els.rate.textContent = `${audioContext.sampleRate} Hz`;
          const moduleUrl = URL.createObjectURL(
            new Blob([workletSource], { type: "application/javascript" })
          );
          await audioContext.audioWorklet.addModule(moduleUrl);
          URL.revokeObjectURL(moduleUrl);

          ws = new WebSocket(realtimeUrl());
          setSocket("connecting");

          ws.addEventListener("open", () => {
            setSocket("open", true);
            setAudio("streaming");
            isRecording = true;
            sendJson({
              type: "session.update",
              session: {
                type: "transcription",
                audio: {
                  input: {
                    format: {
                      type: "audio/pcm",
                      rate: audioContext.sampleRate,
                    },
                  },
                },
              },
            });

            source = audioContext.createMediaStreamSource(mediaStream);
            worklet = new AudioWorkletNode(audioContext, "capture-processor");
            mutedOutput = audioContext.createGain();
            mutedOutput.gain.value = 0;
            worklet.port.onmessage = (event) => {
              if (!isRecording || !ws || ws.readyState !== WebSocket.OPEN) return;
              frameCount += 1;
              els.frames.textContent = String(frameCount);
              sendJson({
                type: "input_audio_buffer.append",
                audio: pcm16Base64(event.data),
              });
            };
            source.connect(worklet);
            worklet.connect(mutedOutput);
            mutedOutput.connect(audioContext.destination);
          });

          ws.addEventListener("message", (message) => {
            const event = JSON.parse(message.data);
            if (event.type === "conversation.item.input_audio_transcription.delta") {
              appendTranscriptDelta(event.delta || "");
            } else if (event.type === "conversation.item.input_audio_transcription.completed") {
              renderTranscript(event.transcript || transcriptText);
              setText(els.final, event.transcript || transcriptText);
              if (!isRecording) setSocket("completed", true);
            } else if (event.type === "error") {
              log(event.error?.message || "error", "error");
            } else {
              log(event.type || message.data);
            }
          });

          ws.addEventListener("close", () => {
            setSocket("closed");
            cleanupAudio();
          });

          ws.addEventListener("error", () => {
            setSocket("error");
            log("websocket error", "error");
          });
        } catch (error) {
          els.start.disabled = false;
          els.stop.disabled = true;
          setAudio("failed", true);
          log(error.message || String(error), "error");
          cleanupAudio();
        }
      }

      function cleanupAudio() {
        isRecording = false;
        if (worklet) worklet.disconnect();
        if (source) source.disconnect();
        if (mutedOutput) mutedOutput.disconnect();
        if (mediaStream) {
          for (const track of mediaStream.getTracks()) track.stop();
        }
        if (audioContext && audioContext.state !== "closed") {
          audioContext.close();
        }
        worklet = null;
        source = null;
        mutedOutput = null;
        mediaStream = null;
        audioContext = null;
        els.start.disabled = false;
        els.stop.disabled = true;
        setAudio("idle");
        setSignal(0);
      }

      function stop() {
        isRecording = false;
        cleanupAudio();
        setAudio("committed");
        sendJson({ type: "input_audio_buffer.commit" });
      }

      els.start.addEventListener("click", start);
      els.stop.addEventListener("click", stop);
      els.clear.addEventListener("click", () => {
        resetTranscript();
        els.events.textContent = "";
      });

      setSocket("idle");
      setAudio("idle");
      setSignal(0);
      log(realtimeUrl());
    </script>
  </body>
</html>
