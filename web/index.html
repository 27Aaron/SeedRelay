<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SeedRelay</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #10120f;
        --panel: #171a16;
        --panel-2: #20241d;
        --ink: #eef2df;
        --muted: #a9b29a;
        --line: #343b2e;
        --accent: #d7ff5f;
        --accent-2: #7bdff2;
        --danger: #ff7a7a;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(215, 255, 95, 0.09), transparent 34%),
          radial-gradient(circle at 80% 16%, rgba(123, 223, 242, 0.14), transparent 28%),
          var(--bg);
        color: var(--ink);
        font-family:
          ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas,
          monospace;
      }

      main {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      .shell {
        display: grid;
        grid-template-columns: minmax(280px, 0.86fr) minmax(420px, 1.14fr);
        gap: 16px;
        min-height: calc(100vh - 64px);
      }

      .panel {
        min-width: 0;
        border: 1px solid var(--line);
        background: color-mix(in srgb, var(--panel) 92%, transparent);
        box-shadow: var(--shadow);
      }

      .control {
        display: flex;
        flex-direction: column;
        padding: 22px;
      }

      .brand {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
        flex-wrap: wrap;
        padding-bottom: 22px;
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0;
        font-size: clamp(26px, 4.6vw, 58px);
        line-height: 0.94;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .wordmark {
        white-space: nowrap;
      }

      .tag {
        border: 1px solid var(--line);
        color: var(--accent);
        padding: 8px 10px;
        white-space: nowrap;
        font-size: 12px;
        background: #10140e;
      }

      .status-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 10px;
        margin: 20px 0;
      }

      .metric {
        min-height: 82px;
        padding: 13px;
        background: var(--panel-2);
        border: 1px solid var(--line);
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        margin-bottom: 12px;
      }

      .metric strong {
        display: block;
        font-size: 18px;
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      .buttons {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 44px;
        gap: 10px;
        margin-top: auto;
      }

      button {
        height: 44px;
        border: 1px solid var(--line);
        background: #eef2df;
        color: #11140f;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button.secondary {
        background: transparent;
        color: var(--ink);
      }

      button.icon {
        background: var(--panel-2);
        color: var(--muted);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.42;
      }

      .meter {
        height: 12px;
        margin: 4px 0 22px;
        border: 1px solid var(--line);
        background: #0b0d0a;
        overflow: hidden;
      }

      .meter div {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        transition: width 90ms linear;
      }

      .transcript {
        min-width: 0;
        display: grid;
        grid-template-rows: minmax(240px, 1fr) minmax(180px, 0.64fr);
        gap: 16px;
      }

      .readout,
      .events {
        padding: 22px;
        overflow: hidden;
      }

      .readout {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        min-height: 0;
      }

      .label {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      .label-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--line);
      }

      .live-dot {
        width: 8px;
        height: 8px;
        background: var(--accent);
        box-shadow: 0 0 18px rgba(215, 255, 95, 0.56);
      }

      #partial,
      #final {
        font-family:
          "Iowan Old Style", "Songti SC", "Noto Serif CJK SC", Georgia, serif;
        letter-spacing: 0;
      }

      #partial {
        min-height: 210px;
        padding: 4px 0 16px;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      #partial.empty::before,
      #final.empty::before {
        content: attr(data-placeholder);
        display: block;
        color: color-mix(in srgb, var(--muted) 58%, transparent);
        font-family:
          ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas,
          monospace;
        font-size: 14px;
        line-height: 1.6;
      }

      .transcript-line {
        display: grid;
        grid-template-columns: 38px minmax(0, 1fr);
        gap: 12px;
        align-items: baseline;
        min-height: 48px;
        padding: 9px 0;
        border-bottom: 1px solid color-mix(in srgb, var(--line) 72%, transparent);
      }

      .line-index {
        color: color-mix(in srgb, var(--muted) 70%, transparent);
        font-size: 11px;
        font-family:
          ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas,
          monospace;
        text-transform: uppercase;
      }

      .line-text {
        color: color-mix(in srgb, var(--ink) 94%, transparent);
        font-family:
          "Iowan Old Style", "Songti SC", "Noto Serif CJK SC", Georgia, serif;
        font-size: clamp(20px, 2.2vw, 32px);
        line-height: 1.32;
        overflow-wrap: anywhere;
      }

      .transcript-line.active .line-index {
        color: var(--accent);
      }

      .transcript-line.active .line-text {
        color: var(--ink);
      }

      .final-wrap {
        min-height: 96px;
        margin-top: 18px;
        padding-top: 16px;
        border-top: 1px solid var(--line);
        overflow: hidden;
      }

      .final-label {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      #final {
        color: var(--accent);
        font-size: clamp(18px, 2vw, 28px);
        line-height: 1.35;
        max-height: 160px;
        overflow: auto;
        overflow-wrap: anywhere;
      }

      #events {
        height: calc(100% - 28px);
        overflow: auto;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.65;
        white-space: pre-wrap;
      }

      .ok {
        color: var(--accent);
      }

      .bad {
        color: var(--danger);
      }

      @media (max-width: 860px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .control {
          min-height: 430px;
        }
      }

      @media (max-width: 520px) {
        main {
          width: min(100vw - 24px, 1180px);
          padding: 24px 0;
        }

        .shell {
          min-height: calc(100vh - 48px);
        }

        .control,
        .readout,
        .events {
          padding: 22px;
        }

        .brand {
          flex-direction: column;
          align-items: flex-start;
        }

        .wordmark {
          font-size: clamp(24px, 7vw, 34px);
        }

        .line-text {
          font-size: clamp(20px, 6vw, 28px);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="shell">
        <section class="panel control">
          <div class="brand">
            <h1 class="wordmark">Seed Relay</h1>
            <div class="tag">seed-asr-2.0</div>
          </div>

          <div class="status-grid">
            <div class="metric">
              <span>Socket</span>
              <strong id="socketState">idle</strong>
            </div>
            <div class="metric">
              <span>Audio</span>
              <strong id="audioState">idle</strong>
            </div>
            <div class="metric">
              <span>Rate</span>
              <strong id="rate">--</strong>
            </div>
            <div class="metric">
              <span>Frames</span>
              <strong id="frames">0</strong>
            </div>
          </div>

          <div class="label">Signal</div>
          <div class="meter"><div id="level"></div></div>

          <div class="buttons">
            <button id="start">Start</button>
            <button id="stop" class="secondary" disabled>Stop</button>
            <button id="clear" class="icon" title="Clear">×</button>
          </div>
        </section>

        <section class="transcript">
          <div class="panel readout">
            <div class="label label-row">
              <span>Transcript</span>
              <span class="live-dot" aria-hidden="true"></span>
            </div>
            <div
              id="partial"
              class="empty"
              data-placeholder="Listening transcript appears here"
            ></div>
            <div class="final-wrap">
              <div class="final-label">Final</div>
              <div
                id="final"
                class="empty"
                data-placeholder="Completed transcript appears here"
              ></div>
            </div>
          </div>
          <div class="panel events">
            <div class="label">Events</div>
            <div id="events"></div>
          </div>
        </section>
      </div>
    </main>

    <script>
      const els = {
        start: document.querySelector("#start"),
        stop: document.querySelector("#stop"),
        clear: document.querySelector("#clear"),
        socketState: document.querySelector("#socketState"),
        audioState: document.querySelector("#audioState"),
        rate: document.querySelector("#rate"),
        frames: document.querySelector("#frames"),
        level: document.querySelector("#level"),
        partial: document.querySelector("#partial"),
        final: document.querySelector("#final"),
        events: document.querySelector("#events"),
      };

      let ws = null;
      let mediaStream = null;
      let audioContext = null;
      let source = null;
      let worklet = null;
      let mutedOutput = null;
      let frameCount = 0;
      let isRecording = false;
      let transcriptText = "";
      const MAX_TRANSCRIPT_LINE = 12;

      const workletSource = `
        class CaptureProcessor extends AudioWorkletProcessor {
          process(inputs) {
            const channel = inputs[0] && inputs[0][0];
            if (channel && channel.length) {
              this.port.postMessage(channel.slice(0));
            }
            return true;
          }
        }
        registerProcessor("capture-processor", CaptureProcessor);
      `;

      function realtimeUrl() {
        const url = new URL("/v1/realtime?model=seed-asr-2.0", window.location.href);
        url.protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        return url.toString();
      }

      function log(line, kind = "") {
        const time = new Date().toLocaleTimeString();
        const prefix = kind ? `[${kind}]` : "";
        els.events.textContent = `${time} ${prefix} ${line}\n${els.events.textContent}`.slice(0, 7000);
      }

      function setSocket(state, ok = false) {
        els.socketState.textContent = state;
        els.socketState.className = ok ? "ok" : "";
      }

      function setAudio(state, bad = false) {
        els.audioState.textContent = state;
        els.audioState.className = bad ? "bad" : "";
      }

      function pcm16Base64(samples) {
        const bytes = new Uint8Array(samples.length * 2);
        const view = new DataView(bytes.buffer);
        let peak = 0;
        for (let i = 0; i < samples.length; i += 1) {
          const sample = Math.max(-1, Math.min(1, samples[i]));
          peak = Math.max(peak, Math.abs(sample));
          const int16 = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
          view.setInt16(i * 2, int16, true);
        }
        els.level.style.width = `${Math.min(100, peak * 140)}%`;

        let binary = "";
        const chunk = 0x8000;
        for (let i = 0; i < bytes.length; i += chunk) {
          binary += String.fromCharCode(...bytes.subarray(i, i + chunk));
        }
        return btoa(binary);
      }

      function sendJson(payload) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify(payload));
      }

      function setText(el, text) {
        el.textContent = text;
        el.classList.toggle("empty", !text);
      }

      function createTranscriptLine(text, index, active) {
        const row = document.createElement("div");
        row.className = `transcript-line${active ? " active" : ""}`;

        const number = document.createElement("span");
        number.className = "line-index";
        number.textContent = String(index + 1).padStart(2, "0");

        const content = document.createElement("span");
        content.className = "line-text";
        content.textContent = text;

        row.append(number, content);
        return row;
      }

      function splitTranscript(text) {
        const normalized = text.replace(/\s+/g, " ").trim();
        if (!normalized) return [];

        const phrases = normalized.match(/[^。！？!?；;\n]+[。！？!?；;]?/g) || [normalized];
        const lines = [];
        for (const phrase of phrases) {
          let rest = phrase.trim();
          while (rest.length > MAX_TRANSCRIPT_LINE) {
            const slice = rest.slice(0, MAX_TRANSCRIPT_LINE + 1);
            const spaceBreak = slice.lastIndexOf(" ");
            const cut = spaceBreak > 6 ? spaceBreak : MAX_TRANSCRIPT_LINE;
            lines.push(rest.slice(0, cut).trim());
            rest = rest.slice(cut).trim();
          }
          if (rest) lines.push(rest);
        }
        return lines.slice(-12);
      }

      function renderTranscript(text) {
        transcriptText = text;
        const lines = splitTranscript(text);
        els.partial.replaceChildren();
        els.partial.classList.toggle("empty", lines.length === 0);
        for (const [index, line] of lines.entries()) {
          els.partial.append(createTranscriptLine(line, index, index === lines.length - 1));
        }
        els.partial.scrollTop = els.partial.scrollHeight;
      }

      function appendTranscriptDelta(delta) {
        renderTranscript(transcriptText + delta);
      }

      function resetTranscript() {
        renderTranscript("");
        setText(els.final, "");
      }

      async function start() {
        els.start.disabled = true;
        els.stop.disabled = false;
        frameCount = 0;
        els.frames.textContent = "0";
        resetTranscript();
        setAudio("requesting");

        try {
          mediaStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true,
            },
          });
          audioContext = new AudioContext();
          els.rate.textContent = `${audioContext.sampleRate} Hz`;
          const moduleUrl = URL.createObjectURL(
            new Blob([workletSource], { type: "application/javascript" })
          );
          await audioContext.audioWorklet.addModule(moduleUrl);
          URL.revokeObjectURL(moduleUrl);

          ws = new WebSocket(realtimeUrl());
          setSocket("connecting");

          ws.addEventListener("open", () => {
            setSocket("open", true);
            setAudio("streaming");
            isRecording = true;
            sendJson({
              type: "session.update",
              session: {
                type: "transcription",
                audio: {
                  input: {
                    format: {
                      type: "audio/pcm",
                      rate: audioContext.sampleRate,
                    },
                  },
                },
              },
            });

            source = audioContext.createMediaStreamSource(mediaStream);
            worklet = new AudioWorkletNode(audioContext, "capture-processor");
            mutedOutput = audioContext.createGain();
            mutedOutput.gain.value = 0;
            worklet.port.onmessage = (event) => {
              if (!isRecording || !ws || ws.readyState !== WebSocket.OPEN) return;
              frameCount += 1;
              els.frames.textContent = String(frameCount);
              sendJson({
                type: "input_audio_buffer.append",
                audio: pcm16Base64(event.data),
              });
            };
            source.connect(worklet);
            worklet.connect(mutedOutput);
            mutedOutput.connect(audioContext.destination);
          });

          ws.addEventListener("message", (message) => {
            const event = JSON.parse(message.data);
            if (event.type === "conversation.item.input_audio_transcription.delta") {
              appendTranscriptDelta(event.delta || "");
            } else if (event.type === "conversation.item.input_audio_transcription.completed") {
              renderTranscript(event.transcript || transcriptText);
              setText(els.final, event.transcript || transcriptText);
              setSocket("completed", true);
            } else if (event.type === "error") {
              log(event.error?.message || "error", "error");
            } else {
              log(event.type || message.data);
            }
          });

          ws.addEventListener("close", () => {
            setSocket("closed");
            cleanupAudio();
          });

          ws.addEventListener("error", () => {
            setSocket("error");
            log("websocket error", "error");
          });
        } catch (error) {
          els.start.disabled = false;
          els.stop.disabled = true;
          setAudio("failed", true);
          log(error.message || String(error), "error");
          cleanupAudio();
        }
      }

      function cleanupAudio() {
        isRecording = false;
        if (worklet) worklet.disconnect();
        if (source) source.disconnect();
        if (mutedOutput) mutedOutput.disconnect();
        if (mediaStream) {
          for (const track of mediaStream.getTracks()) track.stop();
        }
        if (audioContext && audioContext.state !== "closed") {
          audioContext.close();
        }
        worklet = null;
        source = null;
        mutedOutput = null;
        mediaStream = null;
        audioContext = null;
        els.start.disabled = false;
        els.stop.disabled = true;
        setAudio("idle");
        els.level.style.width = "0%";
      }

      function stop() {
        isRecording = false;
        cleanupAudio();
        setAudio("committed");
        sendJson({ type: "input_audio_buffer.commit" });
      }

      els.start.addEventListener("click", start);
      els.stop.addEventListener("click", stop);
      els.clear.addEventListener("click", () => {
        resetTranscript();
        els.events.textContent = "";
      });

      setSocket("idle");
      setAudio("idle");
      log(realtimeUrl());
    </script>
  </body>
</html>
